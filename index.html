<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg-card:#0f1a2e;--bg-sidebar:#0c1525;
  --fg:#f0f4fc;--fg-muted:#7a8ba8;--fg-dim:#4a5a78;
  --primary:#22d3ee;--primary-dim:rgba(34,211,238,0.12);--primary-glow:rgba(34,211,238,0.25);
  --border:#1a2a44;--border-hover:#2a3a5a;
  --red:#ef4444;--green:#22c55e;
  --radius:8px;
}
html{font-size:15px}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}

/* LAYOUT */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;height:52px;background:var(--bg-card);border-bottom:1px solid var(--border);padding:0 16px;gap:12px;position:sticky;top:0;z-index:100}
.topbar-logo{display:flex;align-items:center;gap:8px;color:var(--primary);font-weight:700;font-size:1.05rem;cursor:pointer;white-space:nowrap}
.topbar-logo svg{width:24px;height:24px;flex-shrink:0}
.topbar-tabs{display:flex;gap:4px;margin-left:auto}
.topbar-tab{background:none;border:1px solid transparent;color:var(--fg-muted);padding:6px 14px;border-radius:var(--radius);cursor:pointer;font:inherit;font-size:.85rem;white-space:nowrap;transition:all .15s}
.topbar-tab:hover{color:var(--fg);background:var(--primary-dim)}
.topbar-tab.active{color:var(--primary);background:var(--primary-dim);border-color:var(--primary);font-weight:600}
.menu-btn{display:none;background:none;border:none;color:var(--fg);font-size:1.3rem;cursor:pointer;padding:4px 8px}

.main-wrap{display:flex;flex:1;position:relative}

/* SIDEBAR */
.sidebar{width:210px;background:var(--bg-sidebar);border-right:1px solid var(--border);padding:8px;overflow-y:auto;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px)}
.sidebar-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;color:var(--fg-muted);padding:9px 12px;border-radius:var(--radius);cursor:pointer;font:inherit;font-size:.85rem;text-align:left;transition:all .15s}
.sidebar-btn:hover{background:var(--primary-dim);color:var(--fg)}
.sidebar-btn.active{background:var(--primary-dim);color:var(--primary);font-weight:600}
.sidebar-btn .icon{font-size:1.05rem;width:1.4em;text-align:center;flex-shrink:0}

/* CONTENT */
.content{flex:1;padding:24px;max-width:900px;margin:0 auto;width:100%}

/* CALC CARD */
.calc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px}
.calc-card h2{font-size:1.3rem;margin-bottom:12px;color:var(--fg)}
.info-box{background:var(--primary-dim);border:1px solid rgba(34,211,238,0.2);border-radius:var(--radius);padding:10px 14px;font-family:'DM Sans',monospace;font-size:.88rem;color:var(--primary);margin-bottom:18px;letter-spacing:0.02em}

.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-row label{font-size:.82rem;color:var(--fg-muted);font-weight:500}
.form-row select,.form-row input{background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:9px 12px;border-radius:var(--radius);font:inherit;font-size:.9rem;outline:none;transition:border-color .15s}
.form-row select:focus,.form-row input:focus{border-color:var(--primary)}
.form-row select{cursor:pointer}
.form-row select option{background:var(--bg-card);color:var(--fg)}

.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 16px}

.calc-btn{width:100%;background:linear-gradient(135deg,var(--primary),#06b6d4);color:#0a1628;border:none;padding:12px;border-radius:var(--radius);font:inherit;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .15s,transform .1s}
.calc-btn:hover{opacity:.9}
.calc-btn:active{transform:scale(0.98)}

.result-box{margin-top:18px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;animation:fadeIn .2s ease}
.result-value{font-size:1.35rem;font-weight:700;color:var(--primary);margin-bottom:8px}
.result-steps{font-size:.85rem;color:var(--fg-muted);white-space:pre-wrap;font-family:'DM Sans',monospace;line-height:1.6}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* RULES PAGE */
.rules-page{max-width:800px;margin:0 auto}
.rules-page h2{font-size:1.3rem;margin-bottom:16px;color:var(--fg)}
.rules-search{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:10px 14px;border-radius:var(--radius);font:inherit;font-size:.9rem;margin-bottom:18px;outline:none;transition:border-color .15s}
.rules-search:focus{border-color:var(--primary)}
.rules-search::placeholder{color:var(--fg-dim)}
.rule-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
.rule-item:hover{border-color:var(--border-hover)}
.rule-q{font-weight:600;color:var(--primary);font-size:.92rem;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:8px}
.rule-q::before{content:'в–ё';color:var(--fg-dim);transition:transform .2s;font-size:.75rem}
.rule-item.open .rule-q::before{transform:rotate(90deg)}
.rule-a{font-size:.87rem;color:var(--fg-muted);line-height:1.65;display:none;padding-top:6px;border-top:1px solid var(--border);margin-top:8px}
.rule-item.open .rule-a{display:block}
.rule-tag{display:inline-block;background:var(--primary-dim);color:var(--primary);font-size:.72rem;padding:2px 7px;border-radius:4px;margin-right:4px;font-weight:600}
.rules-count{font-size:.82rem;color:var(--fg-dim);margin-bottom:12px}

/* AI PAGE */
.ai-page{max-width:700px;margin:40px auto;text-align:center}
.ai-page h2{font-size:1.4rem;margin-bottom:16px}
.ai-page p{color:var(--fg-muted);line-height:1.65;margin-bottom:20px}
.ai-link-btn{display:inline-block;background:linear-gradient(135deg,var(--primary),#06b6d4);color:#0a1628;padding:12px 28px;border-radius:var(--radius);font-weight:700;font-size:.95rem;transition:opacity .15s}
.ai-link-btn:hover{opacity:.85;text-decoration:none}

/* FOOTER */
.app-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;font-size:.75rem;color:var(--fg-dim);border-top:1px solid var(--border);background:var(--bg-card)}
.app-footer a{color:var(--fg-dim);transition:color .15s}
.app-footer a:hover{color:var(--primary)}

/* SIDEBAR OVERLAY */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}

/* MOBILE */
@media(max-width:768px){
  .menu-btn{display:block}
  .topbar-logo span{display:none}
  .topbar-tab{font-size:.78rem;padding:5px 8px}
  .sidebar{position:fixed;left:0;top:52px;bottom:0;z-index:95;transform:translateX(-100%);transition:transform .25s ease}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .form-grid{grid-template-columns:1fr}
  .content{padding:16px}
  .app-footer{flex-direction:column;gap:4px;text-align:center}
}
</style>

// ===================== CALCULATION ENGINE (faithful port of doCalculation) =====================

function doCalculation(catId, type, vals, extraText) {
  const g = 9.80665;
  const R_gas = 8.314;
  const pi = Math.PI;
  let result = 0;
  let unit = '';
  let formula = '';
  let steps = '';

  const v = (id) => vals[id] || 0;

  // KINEMATIKA
  if (catId === 'kin') {
    if (type === 'vel') { result = v('v0') + v('a') * v('t'); unit = 'm/s'; formula = 'v = vвӮҖ + at'; steps = `v = ${v('v0')} + ${v('a')}Г—${v('t')}`; }
    else if (type === 'disp') { result = v('v0') * v('t') + 0.5 * v('a') * v('t') ** 2; unit = 'm'; formula = 's = vвӮҖt + ВҪatВІ'; steps = `s = ${v('v0')}Г—${v('t')} + ВҪГ—${v('a')}Г—${v('t')}ВІ`; }
    else if (type === 'vNoT') { result = Math.sqrt(Math.abs(v('v0') ** 2 + 2 * v('a') * v('s'))); unit = 'm/s'; formula = 'v = вҲҡ(vвӮҖВІ+2as)'; steps = `v = вҲҡ(${v('v0')}ВІ + 2Г—${v('a')}Г—${v('s')})`; }
    else if (type === 'time') { result = v('a') !== 0 ? -v('v0') / v('a') : 0; unit = 's'; formula = 't = -vвӮҖ/a'; steps = `t = -${v('v0')}/${v('a')}`; }
    else if (type === 'acc') { result = v('t') !== 0 ? (v('vf') - v('v0')) / v('t') : 0; unit = 'm/sВІ'; formula = 'a = (v-vвӮҖ)/t'; steps = `a = (${v('vf')}-${v('v0')})/${v('t')}`; }
    else if (type === 'fall') { result = 0.5 * g * v('t') ** 2; unit = 'm'; formula = 'h = ВҪgtВІ'; steps = `h = ВҪГ—${g.toFixed(3)}Г—${v('t')}ВІ`; }
    else if (type === 'projR') { const ang = v('ang') * pi / 180; result = (v('v0') ** 2 * Math.sin(2 * ang)) / g; unit = 'm'; formula = 'R = vвӮҖВІsin(2Оё)/g'; steps = `R = ${v('v0')}ВІГ—sin(2Г—${v('ang')}В°)/${g.toFixed(3)}`; }
    else if (type === 'projH') { const ang = v('ang') * pi / 180; result = (v('v0') ** 2 * Math.sin(ang) ** 2) / (2 * g); unit = 'm'; formula = 'H = vвӮҖВІsinВІОё/(2g)'; steps = `H = ${v('v0')}ВІГ—sinВІ(${v('ang')}В°)/(2Г—${g.toFixed(3)})`; }
  }
  // DYNAMIKA

      result = (pi / 4) * (d_mm ** 2) * s_mm / 1000;
      unit = 'cmВі'; formula = 'V = (ПҖ/4)Г—dВІГ—stroke';
      steps = `V = (ПҖ/4)Г—${d_mm}ВІГ—${s_mm} mmВі\nV = ${(pi/4 * d_mm**2 * s_mm).toFixed(2)} mmВі\nV = ${result.toFixed(2)} cmВі`;
    }
    else if (type === 'displTotal') {
      const d_mm = v('bore');
      const s_mm = v('stroke');
      const n_cyl = v('n_cyl') || 1;
      const V_one = (pi / 4) * (d_mm ** 2) * s_mm / 1000;
      result = V_one * n_cyl;
      unit = 'cmВі'; formula = 'V_total = VГ—n_cyl';
      steps = `V_1valec = (ПҖ/4)Г—${d_mm}ВІГ—${s_mm}/1000 = ${V_one.toFixed(2)} cmВі\nV_total = ${V_one.toFixed(2)}Г—${n_cyl} = ${result.toFixed(2)} cmВі`;
    }
    else if (type === 'compR') {
      const d_mm = v('bore');
      const s_mm = v('stroke');
      const V_disp = (pi / 4) * (d_mm ** 2) * s_mm / 1000;
      const Vc = v('Vc') || 1;
      result = (V_disp + Vc) / Vc;
      unit = ':1'; formula = 'CR = (V_d + V_c) / V_c';
      steps = `V_zdvih = ${V_disp.toFixed(2)} cmВі\nCR = (${V_disp.toFixed(2)} + ${Vc}) / ${Vc}`;
    }
    else if (type === 'meanPist') {
      const s_m = v('stroke') / 1000;
      const rpm = v('n');
      result = 2 * s_m * rpm / 60;
      unit = 'm/s'; formula = 'v_p = 2Г—strokeГ—n/60';
      steps = `v_p = 2Г—${s_m.toFixed(4)}Г—${rpm}/60`;
    }
    else if (type === 'torquePow') {
      const T_val = v('T');
      const rpm = v('n');
      const omega = 2 * pi * rpm / 60;
      result = T_val * omega / 1000;
      unit = 'kW'; formula = 'P = TГ—Пү';
      steps = `Пү = 2ПҖГ—${rpm}/60 = ${omega.toFixed(4)} rad/s\nP = ${T_val}Г—${omega.toFixed(4)} = ${(T_val*omega).toFixed(2)} W = ${result.toFixed(4)} kW`;
    }
    else if (type === 'bmep') {
      const T_val = v('T');
      const d_mm = v('bore');
      const s_mm = v('stroke');
      const n_cyl = v('n_cyl') || 1;
      const V_d_m3 = (pi / 4) * (d_mm/1000) ** 2 * (s_mm/1000) * n_cyl;
      result = V_d_m3 > 0 ? (4 * pi * T_val) / V_d_m3 / 1e6 : 0;
      unit = 'MPa'; formula = 'BMEP = 4ПҖT/V_d';
      steps = `V_d = ${(V_d_m3*1e6).toFixed(2)} cmВі\nBMEP = 4ПҖГ—${T_val}/${(V_d_m3*1e6).toFixed(2)}cmВі`;
    }
  }
  // SENDVIДҢ & KOMPOZITY
  else if (catId === 'sandwich') {
    if (type === 'sandwichBend') {
      const b = v('b_width');
      const h = v('h_total');
      const t = v('t_skin');
      const ti = v('t_inner') || t;
      const M = v('M_bend') * 1000;
      const hc = h - t - ti;
      const I_val = (b / 12) * (h**3 - hc**3);
      const y_max = h / 2;
      result = I_val > 0 ? (M * y_max / I_val) : 0;
      unit = 'MPa'; formula = 'Пғ = My/I';
      steps = `h_core = ${h} - ${t} - ${ti} = ${hc.toFixed(2)} mm\nI = ${b}/12Г—(${h}Ві-${hc.toFixed(2)}Ві) = ${I_val.toFixed(2)} mmвҒҙ\ny_max = ${h}/2 = ${y_max} mm\nM = ${v('M_bend')} NВ·m = ${M} NВ·mm\nПғ = ${M}Г—${y_max}/${I_val.toFixed(2)} = ${result.toFixed(3)} MPa`;
    }
    else if (type === 'sandwichStiff') {
      const b = v('b_width');
      const h = v('h_total');
      const t = v('t_skin');
      const ti = v('t_inner') || t;
      const E = v('E_mod');
      const hc = h - t - ti;
      const I_val = (b / 12) * (h**3 - hc**3);
      const EI = E * 1000 * I_val;
      result = EI / 1e6;
      unit = 'N/mm'; formula = 'K = EI';
      steps = `h_core = ${hc.toFixed(2)} mm\nI = ${b}/12Г—(${h}Ві-${hc.toFixed(2)}Ві) = ${I_val.toFixed(2)} mmвҒҙ\nEI = ${E}Г—10ВіГ—${I_val.toFixed(2)} = ${EI.toFixed(2)} NВ·mmВІ\nK = ${result.toFixed(4)} N/mm`;
    }
    else if (type === 'compositeStress') {
      const b = v('b_width');
      const h = v('h_total');
      const t = v('t_skin');
      const ti = v('t_inner') || t;
      const M = v('M_bend') * 1000;
      const hc = h - t - ti;
      const I_val = (b / 12) * (h**3 - hc**3);
      result = I_val > 0 ? (M * (h/2) / I_val) : 0;
      unit = 'MPa'; formula = 'Пғ_skin = MГ—(h/2)/I';
      steps = `I = ${I_val.toFixed(2)} mmвҒҙ\nПғ = ${M}Г—${(h/2).toFixed(1)}/${I_val.toFixed(2)} = ${result.toFixed(3)} MPa`;
    }
    else if (type === 'secondMoment') {
      const b = v('b_width');
      const h = v('h_total');
      result = b * h**3 / 12;
      unit = 'mmвҒҙ'; formula = 'I = bhВі/12';
      steps = `I = ${b}Г—${h}Ві/12 = ${result.toFixed(2)} mmвҒҙ`;
    }
    else if (type === 'sectionMod') {
      const b = v('b_width');
      const h = v('h_total');
      result = b * h**2 / 6;
      unit = 'mmВі'; formula = 'W = bhВІ/6';
      steps = `W = ${b}Г—${h}ВІ/6 = ${result.toFixed(2)} mmВі`;
    }
  }
  // ДҢГҚSLA & LOGIKA
  else if (catId === 'numser') {
    if (type === 'hexToDec') {
      const hexStr = (extraText && extraText.hexVal || '0').trim();
      result = parseInt(hexStr, 16) || 0;
      unit = ''; formula = 'hex вҶ’ dec';
      steps = `0x${hexStr.toUpperCase()} = ${result}`;
    }
    else if (type === 'decToHex') {
      const dec = Math.round(v('decVal'));
      const hexResult = dec.toString(16).toUpperCase();
      result = dec;
      unit = `(hex: ${hexResult})`; formula = 'dec вҶ’ hex';
      steps = `${dec} = 0x${hexResult}`;
    }
    else if (type === 'binToDec') {
      const binStr = (extraText && extraText.binVal || '0').trim();
      result = parseInt(binStr, 2) || 0;
      unit = ''; formula = 'bin вҶ’ dec';
      steps = `0b${binStr} = ${result}`;
    }
    else if (type === 'decToBin') {
      const dec = Math.round(v('decVal'));
      const binResult = dec.toString(2);
      result = dec;
      unit = `(bin: ${binResult})`; formula = 'dec вҶ’ bin';
      steps = `${dec} = 0b${binResult}`;
    }
    else if (type === 'hexSeq') {
      const seqStr = (extraText && extraText.hexVal || '').trim();
      const parts = seqStr.split(/[,;\s]+/).filter(function(s) { return s.length > 0; });
      const decVals = parts.map(function(p) { return parseInt(p, 16); });
      if (decVals.length >= 2 && decVals.every(function(d) { return !isNaN(d); })) {
        const diffs = [];
        for (let i = 1; i < decVals.length; i++) diffs.push(decVals[i] - decVals[i-1]);
        let nextDiff = diffs[diffs.length - 1];
        if (diffs.length >= 3) {
          const isAlternating = diffs.every(function(d, i) { return d === diffs[i % 2]; });
          if (isAlternating && diffs.length >= 2) {
            nextDiff = diffs[diffs.length % 2];
          }
        }
        const allSame = diffs.every(function(d) { return d === diffs[0]; });
        if (allSame) nextDiff = diffs[0];
        const nextVal = decVals[decVals.length - 1] + nextDiff;
        result = nextVal;
        const nextHex = nextVal.toString(16).toUpperCase();
        unit = `(hex: ${nextHex})`; formula = 'Hex sekvencia';
        steps = `Sekvencia: ${parts.join(', ')}\nDecimГЎlne: ${decVals.join(', ')}\nRozdiely: ${diffs.join(', ')}\nДҺalЕЎie: ${nextVal} = 0x${nextHex}`;
      } else {
        result = 0; unit = ''; formula = 'Hex sekvencia';
        steps = 'Zadaj hex ДҚГӯsla oddelenГ© ДҚiarkami do poДҫa Hex (napr. E,13,16,1B,1E)';
      }
    }
  }
  // KONVERZIE
  else if (catId === 'conv') {
    const val = v('val');
    const convMap = {
      'kmh_ms': [1 / 3.6, 'm/s'], 'ms_kmh': [3.6, 'km/h'], 'mph_kmh': [1.60934, 'km/h'],
      'n_kgf': [1 / 9.80665, 'kgf'], 'kgf_n': [9.80665, 'N'], 'lbf_n': [4.44822, 'N'],
      'pa_bar': [1e-5, 'bar'], 'bar_pa': [1e5, 'Pa'], 'psi_bar': [0.0689476, 'bar'],
      'c_f': [function(x) { return x * 9 / 5 + 32; }, 'В°F'], 'f_c': [function(x) { return (x - 32) * 5 / 9; }, 'В°C'], 'c_k': [function(x) { return x + 273.15; }, 'K'],
      'mm_in': [1 / 25.4, 'in'], 'in_mm': [25.4, 'mm'], 'm_ft': [3.28084, 'ft'],
      'kg_lb': [2.20462, 'lb'], 'lb_kg': [0.453592, 'kg'],
      'nm_lbft': [0.737562, 'lbВ·ft'], 'lbft_nm': [1.35582, 'NВ·m'],
      'kw_hp': [1.34102, 'hp'], 'hp_kw': [0.7457, 'kW'],
    };
    const conv = convMap[type];
    if (conv) {
      const factor = conv[0];
      const u = conv[1];
      result = typeof factor === 'function' ? factor(val) : val * factor;
      unit = u;
      formula = 'Konverzia';
      steps = `${val} вҶ’ ${result.toFixed(6)} ${u}`;
    }
  }

  return {
    value: result.toFixed(4) + ' ' + unit,
    steps: formula + '\n  ' + steps + '\n  = ' + result.toFixed(4) + ' ' + unit
  };
}

// ===================== RENDERING =====================

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = categories.map(function(c) {
    return '<button class="sidebar-btn' + (c.id === activeCategory ? ' active' : '') + '" onclick="selectCategory(\'' + c.id + '\')">' +
      '<span class="icon">' + c.icon + '</span>' + c.name + '</button>';
  }).join('');
}

function renderCalcPage() {
  const cat = categories.find(function(c) { return c.id === activeCategory; });
  const cfg = categoriesConfig.find(function(c) { return c.id === activeCategory; });
  if (!cat || !cfg) return '';

  let html = '<div class="calc-card">';
  html += '<h2>' + cat.icon + ' ' + cat.name + '</h2>';
  html += '<div class="info-box">' + cfg.info + '</div>';

  // Type selector or conversion pair selector
  if (activeCategory === 'conv' && cfg.conversions) {
    const currentConv = convPair || cfg.conversions[0][1];
    html += '<div class="form-row"><label>Konverzia</label><select id="convSelect" onchange="handleConvChange(this.value)">';
    cfg.conversions.forEach(function(c) {
      html += '<option value="' + c[1] + '"' + (c[1] === currentConv ? ' selected' : '') + '>' + c[0] + '</option>';
    });
    html += '</select></div>';
  } else {
    const currentType = getCalcType();
    html += '<div class="form-row"><label>Typ vГҪpoДҚtu</label><select id="typeSelect" onchange="handleTypeChange(this.value)">';
    cfg.types.forEach(function(t) {
      html += '<option value="' + t.v + '"' + (t.v === currentType ? ' selected' : '') + '>' + t.l + '</option>';
    });
    html += '</select></div>';
  }

  // Fields
  html += '<div class="form-grid">';
  cfg.fields.forEach(function(f) {
    html += '<div class="form-row"><label>' + f.l + '</label>';
    if (activeCategory === 'numser' && (f.id === 'hexVal' || f.id === 'binVal')) {
      const placeholder = f.id === 'hexVal' ? 'napr. 1E alebo E,13,16,1B,1E' : 'napr. 10110';
      const curVal = textValues[f.id] || '';
      html += '<input type="text" placeholder="' + placeholder + '" value="' + escHtml(curVal) + '" oninput="handleTextChange(\'' + f.id + '\',this.value)">';
    } else {
      const curVal = fieldValues[f.id] !== undefined ? fieldValues[f.id] : f.d;
      if (fieldValues[f.id] === undefined) fieldValues[f.id] = f.d;
      html += '<input type="number" step="any" value="' + curVal + '" oninput="handleFieldChange(\'' + f.id + '\',this.value)">';
    }
    html += '</div>';
  });
  html += '</div>';

  html += '<button class="calc-btn" onclick="calculate()">VypoДҚГӯtaЕҘ</button>';

  if (calcResult) {
    html += '<div class="result-box"><div class="result-value">' + escHtml(calcResult.value) + '</div>';
    html += '<pre class="result-steps">' + escHtml(calcResult.steps) + '</pre></div>';
  }

  html += '</div>';
  return html;
}

function renderRulesPage() {
  let html = '<div class="rules-page">';
  html += '<h2>рҹӨ– AI PravidlГЎ вҖ” FSG 2026 Rules v1.1</h2>';
  html += '<div style="background:linear-gradient(135deg,rgba(34,211,238,0.15),rgba(6,182,212,0.08));border:1px solid rgba(34,211,238,0.3);border-radius:12px;padding:18px 20px;margin-bottom:20px">';
  html += '<div style="font-weight:700;color:var(--primary);font-size:1rem;margin-bottom:8px">рҹ’Ў AI s kompletnГҪm znalostnГҪm balГӯkom FSG 2026 Rules</div>';
  html += '<div style="color:var(--fg-muted);font-size:.88rem;line-height:1.6;margin-bottom:14px">PlnГҪ AI asistent s <b>135 stranami FSG 2026 pravidiel</b> nahratГҪmi priamo do modelu. Vie citovaЕҘ konkrГ©tne pravidlГЎ, vysvetliЕҘ poЕҫiadavky a pomГҙcЕҘ s otГЎzkami.</div>';
  html += '<a class="ai-link-btn" href="https://www.perplexity.ai/computer/a/fs-quiz-calculator-QRf4QXNnRDCCFNqNtAlB_w" target="_blank" rel="noopener" style="font-size:.88rem;padding:10px 22px">OtvoriЕҘ AI PravidlГЎ (Perplexity)</a>';
  html += '</div>';
  html += '<h3 style="font-size:1rem;margin-bottom:10px;color:var(--fg-muted)">RГҪchly prehДҫad pravidiel (offline)</h3>';
  html += '<input class="rules-search" id="rulesSearch" type="text" placeholder="HДҫadaЕҘ v pravidlГЎch... (napr. ground clearance, brzdy, napГӨtie)" oninput="filterRules()">';
  html += '<div class="rules-count" id="rulesCount">' + fsRules.length + ' pravidiel</div>';
  html += '<div id="rulesList">';
  fsRules.forEach(function(r, i) {
    html += '<div class="rule-item" id="rule-' + i + '" onclick="toggleRule(' + i + ')">';
    html += '<div class="rule-q">' + r.q + '</div>';
    html += '<div class="rule-a">';
    r.tags.forEach(function(t) { html += '<span class="rule-tag">' + t + '</span>'; });
    html += '<br><br>' + r.a + '</div>';
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderAIPage() {
  let html = '<div class="ai-page">';
  html += '<h2>вңЁ AI Asistent</h2>';
  html += '<p>PlnГҪ AI asistent s podporou obrГЎzkov, vГҪpoДҚtov a kompletnГҪch FSG 2026 pravidiel je dostupnГҪ v Perplexity verzii.</p>';
  html += '<div style="display:flex;flex-direction:column;gap:10px;margin-top:24px;align-items:center">';
  html += '<a class="ai-link-btn" href="https://www.perplexity.ai/computer/a/fs-quiz-calculator-QRf4QXNnRDCCFNqNtAlB_w" target="_blank" rel="noopener">рҹӨ– OtvoriЕҘ AI Asistent</a>';
  html += '</div>';
  html += '<div style="margin-top:32px;text-align:left;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px">';
  html += '<div style="font-weight:700;margin-bottom:12px;font-size:.95rem">ДҢo AI Asistent vie:</div>';
  html += '<ul style="color:var(--fg-muted);font-size:.88rem;line-height:1.8;padding-left:20px">';
  html += '<li>рҹ“Ӣ OdpovedaЕҘ na otГЎzky o <b>FSG 2026 Rules v1.1</b> (135 strГЎn)</li>';
  html += '<li>рҹ”ў RieЕЎiЕҘ inЕҫinierske a fyzikГЎlne vГҪpoДҚty krok za krokom</li>';
  html += '<li>рҹ“· AnalyzovaЕҘ obrГЎzky so zadaniami z FS Quiz</li>';
  html += '<li>вҡЎ VysvetliЕҘ EV/CV pravidlГЎ, shutdown circuit, scoring</li>';
  html += '<li>рҹҸҺпёҸ PomГҙcЕҘ s nГЎvrhom vozidla podДҫa pravidiel</li>';
  html += '</ul></div>';
  html += '</div>';
  return html;
}

function render() {
  const content = document.getElementById('mainContent');
  const sidebar = document.getElementById('sidebar');

  // Tabs
  document.querySelectorAll('.topbar-tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-tab') === activeTab);
  });

  // Sidebar visibility
  sidebar.style.display = activeTab === 'calc' ? '' : 'none';

  if (activeTab === 'calc') {
    renderSidebar();
    content.innerHTML = renderCalcPage();
  } else if (activeTab === 'rules') {
    content.innerHTML = renderRulesPage();
  } else if (activeTab === 'ai') {
    content.innerHTML = renderAIPage();
  }
}

// ===================== EVENT HANDLERS =====================

function escHtml(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function getCalcType() {
  const cfg = categoriesConfig.find(function(c) { return c.id === activeCategory; });
  return cfg ? (cfg._selectedType || cfg.types[0].v) : '';
}

function switchTab(tab) {
  activeTab = tab;
  calcResult = null;
  closeSidebar();
  render();
}

function selectCategory(catId) {
  activeCategory = catId;
  calcResult = null;
  // Reset field values for new category
  fieldValues = {};
  textValues = {};
  convPair = '';
  closeSidebar();
  render();
}

function handleTypeChange(val) {
  const cfg = categoriesConfig.find(function(c) { return c.id === activeCategory; });
  if (cfg) cfg._selectedType = val;
  calcResult = null;
  render();
}

function handleConvChange(val) {
  convPair = val;
  calcResult = null;
}

function handleFieldChange(id, val) {
  fieldValues[id] = parseFloat(val) || 0;
}

function handleTextChange(id, val) {
  textValues[id] = val;
}

function calculate() {
  const cfg = categoriesConfig.find(function(c) { return c.id === activeCategory; });
  if (!cfg) return;
  const type = activeCategory === 'conv' ? (convPair || (cfg.conversions && cfg.conversions[0][1]) || '') : getCalcType();
  // Initialize any missing field defaults
  cfg.fields.forEach(function(f) {
    if (activeCategory === 'numser' && (f.id === 'hexVal' || f.id === 'binVal')) return;
    if (fieldValues[f.id] === undefined) fieldValues[f.id] = f.d;
  });
  calcResult = doCalculation(activeCategory, type, fieldValues, textValues);
  // Only update result box, not entire page
  const content = document.getElementById('mainContent');
  content.innerHTML = renderCalcPage();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function toggleRule(i) {
  const el = document.getElementById('rule-' + i);
  if (el) el.classList.toggle('open');
}

function filterRules() {
  const q = document.getElementById('rulesSearch').value.toLowerCase();
  let count = 0;
  fsRules.forEach(function(r, i) {
    const el = document.getElementById('rule-' + i);
    if (!el) return;
    const match = !q || r.q.toLowerCase().includes(q) || r.a.toLowerCase().includes(q) || r.tags.some(function(t) { return t.toLowerCase().includes(q); });
    el.style.display = match ? '' : 'none';
    if (match) count++;
  });
  const countEl = document.getElementById('rulesCount');
  if (countEl) countEl.textContent = count + ' pravidiel';
}

// ===================== INIT =====================
render();
</script>
